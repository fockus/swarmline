evaluation_specification:
  task: 'Phase 4: Command Routing'
  criteria:
    - name: correctness
      weight: 0.30
      rubric: 'All DoD requirements implemented and verifiable: /command intercepted before LLM call, non-command text passes through unmodified, absent CommandRegistry preserves backward compatibility, command executes after UserPromptSubmit hooks, Stop hook fires on command match, RuntimeEvent.final emitted for command results.'
      checklist:
        - 'Slash command input (e.g. "/help") is intercepted in ThinRuntime.run() BEFORE any LLM API call is made'
        - 'Command result is yielded as RuntimeEvent with final=True, no further processing occurs'
        - 'Non-command user text (no "/" prefix or unregistered command) flows through to LLM unchanged'
        - 'When command_registry is None in AgentConfig/ThinRuntime, interception logic is completely skipped — zero behavioral change from v1.4.x'
        - 'Command interception occurs AFTER UserPromptSubmit hook has been dispatched and not vetoed'
        - 'Stop hook fires when a command is matched, signaling end of turn'
        - 'All 10+ new tests pass (8 unit + 2 wiring + 2 integration minimum)'
        - 'Full existing test suite (4263+ tests) passes with zero regressions'
        - 'Edge cases handled: empty command name, command with arguments, unknown slash command falls through to LLM, URL-like /paths not intercepted, multiline input not intercepted'

    - name: architecture
      weight: 0.25
      rubric: 'Strict Clean Architecture compliance: CommandRegistry/CommandInterceptor protocols in domain layer, wiring in infrastructure, no reverse dependencies. ISP respected. AgentConfig changes are additive only (Optional fields with None default). Dependency direction Infrastructure -> Application -> Domain never violated.'
      checklist:
        - 'command_registry field in AgentConfig is Optional = None (additive, backward-compatible)'
        - 'runtime_wiring.py passes command_registry through to ThinRuntime without domain logic leakage'
        - 'ThinRuntime.__init__ accepts optional command_registry parameter — constructor injection (DIP)'
        - 'No circular imports introduced between agent/, runtime/, or protocol modules'
        - 'Interception point in run() is clearly separated from LLM call logic (SRP)'

    - name: test_quality
      weight: 0.20
      rubric: 'TDD-compliant test suite following Testing Trophy and project conventions.'
      checklist:
        - 'Test files exist: test_command_interceptor.py (unit), test_command_wiring.py (wiring), test_command_routing_e2e.py (integration)'
        - 'All test names follow test_<what>_<condition>_<result> pattern'
        - 'Tests use Arrange-Act-Assert structure with clear separation'
        - 'Mocks limited to LLM/external calls; CommandRegistry uses real instances'
        - 'Integration tests verify full path: Agent.query("/cmd") -> ThinRuntime -> CommandRegistry -> RuntimeEvent.final'
        - 'Backward compatibility test present'
        - 'Edge case tests: unknown command, command after hook transform, command with args'

    - name: code_quality
      weight: 0.15
      rubric: 'Production-ready code: type hints, no TODO/placeholder, async-first, ruff-clean.'
      checklist:
        - 'All new functions/methods have complete type annotations'
        - 'No TODO, FIXME, pass-as-placeholder in production code'
        - 'Code passes ruff check without violations'
        - 'New code is minimal — no unnecessary abstractions'

    - name: security
      weight: 0.10
      rubric: 'Command routing respects existing security boundaries.'
      checklist:
        - 'UserPromptSubmit hook fires BEFORE command interception'
        - 'Stop hook fires on command completion — observability not bypassed'
        - 'Command registration is explicit (no auto-discovery)'
        - 'Tool policy enforcement is not bypassed by command routing'

evaluation_specification:
  task: 'Phase 5: Native Tool Calling'
  criteria:
    - name: correctness
      weight: 0.30
      rubric: 'use_native_tools=True sends tools via provider native API, parses structured response, parallel execution, Strangler Fig fallback, backward compat.'
      checklist:
        - 'use_native_tools=True routes to call_with_tools() in react strategy'
        - 'NativeToolCallResult returned with structured tool calls'
        - 'Multiple tool calls executed in parallel via asyncio.gather'
        - 'use_native_tools=False (default) identical to pre-Phase-5 behavior'
        - 'Native failure falls back to JSON-in-text silently'
        - '28 new tests pass, 4388 total, 0 regressions'
    - name: architecture
      weight: 0.25
      rubric: 'Clean Architecture: Protocol in domain layer, adapters in infrastructure, DIP, ISP, no circular imports.'
      checklist:
        - 'NativeToolCallAdapter is @runtime_checkable Protocol'
        - '3 adapters implement call_with_tools() (Anthropic, OpenAI, Google)'
        - 'ToolSpec converters are pure functions'
        - 'NativeToolCall and NativeToolCallResult are frozen dataclasses'
        - 'use_native_tools: bool = False in RuntimeConfig (optional, backward compat)'
        - 'native_adapter parameter is optional in run_react()'
    - name: test_quality
      weight: 0.20
      rubric: 'TDD-compliant, Testing Trophy, proper naming, mocked SDKs.'
      checklist:
        - '18 unit tests in test_native_tools.py (types, converters, adapter mocks)'
        - '7 unit tests in test_native_tools_integration.py (react strategy paths)'
        - '3 integration tests in test_native_tools_e2e.py (ThinRuntime end-to-end)'
        - 'SDKs mocked (anthropic, openai, google) — no real API calls'
        - 'Edge cases: empty tools, text-only response, adapter without call_with_tools'
    - name: code_quality
      weight: 0.15
      rubric: 'Production-ready: types, no TODO, ruff clean, minimal.'
      checklist:
        - 'No TODO/FIXME/placeholder in production code'
        - 'ruff check passes on all changed files'
        - 'Frozen dataclasses for domain types'
        - 'Lazy imports for SDK dependencies'
    - name: security
      weight: 0.10
      rubric: 'Security boundaries respected, no credential leakage.'
      checklist:
        - 'Tool policy enforcement not bypassed by native path'
        - 'Hook dispatch still fires for native tool calls'
        - 'No API keys logged in fallback warning'

evaluation_specification:
  task: 'Phase 11: Foundation Filters'
  criteria:
    - name: correctness
      weight: 0.30
      rubric: 'All 9 requirements (INST-01..05, RMND-01..04) are fully implemented and pass their corresponding tests. ProjectInstructionFilter discovers files walking up from cwd to root, respects format priority, merges instructions with defined strategy, and caches by mtime. SystemReminderFilter evaluates triggers correctly, enforces token budget, orders by priority, and injects into context. All 31 tests (13 + 12 + 6) pass green. No regressions in existing test suite.'
      checklist:
        - 'INST-01: walk-up discovery finds instruction files from cwd to filesystem root'
        - 'INST-02: format priority ordering (RULES.md > CLAUDE.md > AGENTS.md > GEMINI.md) enforced'
        - 'INST-03: merge strategy combines instructions from multiple directories in correct precedence'
        - 'INST-04: mtime-based caching returns cached result when files unchanged'
        - 'INST-05: injection places merged instructions into system_prompt via InputFilter'
        - 'RMND-01: trigger evaluation correctly determines when reminders should fire'
        - 'RMND-02: token budget enforcement truncates or drops low-priority reminders'
        - 'RMND-03: priority ordering sorts reminders by priority value before injection'
        - 'RMND-04: injection inserts active reminders into system_prompt as system-reminder blocks'
        - 'All ProjectInstructionFilter unit tests pass'
        - 'All SystemReminderFilter unit tests pass'
        - 'All integration tests pass (pipeline, combined, backward compat)'
        - 'Existing test suite has zero regressions'
    - name: architecture
      weight: 0.25
      rubric: 'Filters follow Clean Architecture. Both implement existing InputFilter protocol. ThinRuntime.run() is NOT modified. New RuntimeConfig fields are Optional. ISP compliance. No reverse dependency direction.'
      checklist:
        - 'Both filters implement InputFilter protocol (not a new interface)'
        - 'No modifications to ThinRuntime.run()'
        - 'Domain types have zero external dependencies'
        - 'No import from infrastructure into domain/application'
        - 'Any new RuntimeConfig fields are Optional with None default'
        - 'No protocol exceeds 5 methods (ISP)'
        - 'Filters are independent and composable via pipeline pattern'
        - 'File layout matches project convention'
    - name: test_quality
      weight: 0.20
      rubric: 'TDD followed: tests written RED before implementation. Test naming convention. Arrange-Act-Assert. @parametrize used. Edge cases covered. Integration tests use real components. Coverage 95%+ on new files.'
      checklist:
        - 'Test names follow test_<what>_<condition>_<result> pattern'
        - 'Every test uses Arrange-Act-Assert structure'
        - '@pytest.mark.parametrize used for varying inputs'
        - 'Edge cases tested: no files found, empty files, budget=0, all triggers false'
        - 'Integration tests use real filter instances, not mocks'
        - 'No test has more than 5 mocks'
        - 'Coverage of new files is 95%+'
    - name: code_quality
      weight: 0.15
      rubric: 'No TODO/pass/placeholder. Full type hints. Each file under 300 lines. Ruff and ty clean. Frozen dataclasses for domain objects. Docstrings on public APIs.'
      checklist:
        - 'Zero TODO, FIXME, pass-as-placeholder in production code'
        - 'All public functions have type hints'
        - 'Each new file under 300 lines (SRP)'
        - 'ruff check passes with zero errors'
        - 'ty check passes with zero errors'
        - 'New domain dataclasses are frozen=True'
        - 'Public classes have docstrings'
    - name: security
      weight: 0.10
      rubric: 'Walk-up discovery has stop boundary. Symlinks not followed outside project tree. No eval/exec for trigger evaluation. Token budget enforced with hard cap.'
      checklist:
        - 'Walk-up has defined stop boundary (filesystem root)'
        - 'Symlinks handled safely'
        - 'No eval/exec for trigger evaluation'
        - 'Token budget cannot be bypassed'
        - 'Default patterns exclude sensitive files'

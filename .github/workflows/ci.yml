name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  typecheck:
    name: Type-check (ty strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ty + project (with all optional deps for accurate type-checking)
        run: |
          pip install ty
          pip install -e ".[dev,all]"

      - name: Run ty type-check
        run: ty check src/swarmline/

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: pip install -e ".[dev,all]"

      - name: Run pytest (offline)
        run: pytest -m "not live and not slow" -q

  architecture:
    name: Architecture meta-tests (slow)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ty + pytest + project
        run: |
          pip install ty
          pip install -e ".[dev,all]"

      - name: Run architecture tests (incl. ty baseline meta-test)
        run: pytest tests/architecture/ -v -m slow

  audit:
    name: Security audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project (with all optional deps for full coverage)
        run: pip install -e ".[dev,all]"

      - name: Run pip-audit
        run: pip-audit --strict --desc

site_name: Cognitia
site_url: https://fockus.github.io/cognitia
site_description: LLM-agnostic Python framework for building AI agents with pluggable runtimes, memory, tools, and observability
site_author: cognitia contributors
repo_url: https://github.com/fockus/cognitia
repo_name: fockus/cognitia
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024-2026 cognitia contributors

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/robot-outline
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - announce.dismiss

nav:
  - Home: index.md
  - Getting Started:
    - Installation & Quick Start: getting-started.md
    - Why Cognitia?: why-cognitia.md
  - Core Concepts:
    - Agent Facade API: agent-facade.md
    - Runtimes: runtimes.md
    - Architecture: architecture.md
  - Features:
    - Tools & Skills: tools-and-skills.md
    - Web Tools: web-tools.md
    - Memory Providers: memory.md
    - Capabilities: capabilities.md
    - Orchestration: orchestration.md
  - Reference:
    - API Reference: api-reference.md
    - Configuration: configuration.md
    - Advanced Features: advanced.md
    - Examples: examples.md

plugins:
  - search:
      separator: '[\s\-\.]+'
  - minify:
      minify_html: true

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fockus/cognitia
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/cognitia/
  generator: false
  analytics:
    provider: google
    property: G-PLACEHOLDER

extra_css:
  - assets/extra.css

site_name: Cognitia
site_url: https://fockus.github.io/cognitia
site_description: LLM-agnostic Python framework for building AI agents with pluggable runtimes, memory, tools, and observability
site_author: cognitia contributors
repo_url: https://github.com/fockus/cognitia
repo_name: fockus/cognitia
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024-2026 cognitia contributors

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Space Grotesk
    code: IBM Plex Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/robot-outline
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - announce.dismiss

nav:
  - Home: index.md
  - Start:
    - Start Here: getting-started.md
    - Use Cases: use-cases.md
    - Credentials & Providers: credentials.md
    - Why Cognitia?: why-cognitia.md
  - Build:
    - Agent Facade API: agent-facade.md
    - Runtimes: runtimes.md
    - Architecture: architecture.md
    - Tools & Skills: tools-and-skills.md
    - Structured Output: structured-output.md
    - Web Tools: web-tools.md
    - Memory Providers: memory.md
    - Capabilities: capabilities.md
    - Orchestration: orchestration.md
    - Multi-Agent Coordination: multi-agent.md
    - CLI Runtime: cli-runtime.md
    - Production Safety: production-safety.md
    - Sessions: sessions.md
    - Memory Bank: memory-bank.md
    - Code Pipeline: code-pipeline.md
    - Observability: observability.md
    - UI Projection: ui-projection.md
    - RAG: rag.md
  - Recipes:
    - Cookbook: cookbook.md
    - Design Patterns: design-patterns.md
    - Examples: examples.md
    - Migration v0.5 to v1.0: migration-guide.md
  - Reference:
    - API Reference: api-reference.md
    - Runtime Registry: runtime-registry.md
    - Configuration: configuration.md
    - Advanced Features: advanced.md
  - API:
    - Overview: api/index.md
    - Agent: api/agent.md
    - Protocols: api/protocols.md
    - Runtime: api/runtime.md
    - Memory: api/memory.md
    - Tools: api/tools.md
    - Orchestration: api/orchestration.md
    - Multi-Agent: api/multi-agent.md
    - Observability: api/observability.md
    - A2A Protocol: api/a2a.md
    - CLI: api/cli.md

plugins:
  - search:
      separator: '[\s\-\.]+'
  - minify:
      minify_html: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            show_signature_annotations: true
            separate_signature: true
            docstring_style: numpy

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fockus/cognitia
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/cognitia/
  generator: false

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/site.js
